name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install build tool dependencies
        run: npm ci --ignore-scripts
      
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            echo "Error: Version is required. Use a tag (v*) or workflow_dispatch with version input."
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Build app and create DMG
        env:
          NO_SIGN: 1
        run: |
          npx tsx scripts/build-tool.ts create-dmg "$VERSION"
          DMG_PATH=$(find dist -path "*/SharkSpace-${VERSION}.dmg" -type f | head -n 1)
          test -n "$DMG_PATH"
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"
      
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: SharkSpace-${{ env.VERSION }}-dmg
          path: |
            ${{ env.DMG_PATH }}
            ${{ env.DMG_PATH }}.sha256
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.DMG_PATH }}
            ${{ env.DMG_PATH }}.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
