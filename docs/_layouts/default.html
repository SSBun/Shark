<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "Shark" }}</title>
    <meta name="description" content="{{ page.description | default: 'A beautiful macOS application for managing Cursor IDE workspace files.' }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #06B6D4;
            --primary-light: #22D3EE;
            --primary-dark: #0891B2;
            --secondary: #8B5CF6;
            --accent: #F59E0B;
            --success: #10B981;
            --warning: #F59E0B;
            --background: #0A0A0F;
            --surface: #121218;
            --surface-elevated: #1A1A24;
            --surface-hover: #22222E;
            --text: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border: #1E293B;
            --gradient-1: linear-gradient(135deg, #06B6D4 0%, #8B5CF6 100%);
            --gradient-2: linear-gradient(135deg, #F59E0B 0%, #06B6D4 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .bg-effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }

        .bg-orb-1 {
            width: 600px;
            height: 600px;
            background: var(--primary);
            top: -200px;
            left: -200px;
        }

        .bg-orb-2 {
            width: 500px;
            height: 500px;
            background: var(--secondary);
            top: 50%;
            right: -150px;
            animation-delay: -5s;
        }

        .bg-orb-3 {
            width: 400px;
            height: 400px;
            background: var(--accent);
            bottom: -100px;
            left: 30%;
            animation-delay: -10s;
        }

        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(-30px, -20px) scale(1.02); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        header {
            padding: 20px 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            transition: all 0.3s ease;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 800;
            color: var(--text);
            text-decoration: none;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: var(--gradient-1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 8px 32px rgba(6, 182, 212, 0.3);
        }

        nav {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: color 0.2s;
            position: relative;
        }

        nav a:hover {
            color: var(--text);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
            box-shadow: 0 4px 24px rgba(6, 182, 212, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(6, 182, 212, 0.5);
        }

        .btn-secondary {
            background: var(--surface-elevated);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--surface-hover);
        }

        footer {
            padding: 60px 0;
            border-top: 1px solid var(--border);
            text-align: center;
            background: var(--surface);
        }

        footer .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 24px;
        }

        footer p {
            color: var(--text-muted);
            font-size: 14px;
        }

        footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        footer a:hover {
            color: var(--text);
        }

        .footer-links {
            display: flex;
            gap: 32px;
        }

        @media (max-width: 640px) {
            nav {
                display: none;
            }

            footer .container {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="bg-effects">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
        <div class="bg-grid"></div>
    </div>

    <header>
        <div class="container">
            <a href="{{ '/' | relative_url }}" class="logo">
                <div class="logo-icon">🦈</div>
                Shark
            </a>
            <nav>
                <a href="#features">Features</a>
                <a href="#how-it-works">How It Works</a>
                <a href="#installation">Installation</a>
                <a href="https://github.com/SSBun/Shark" target="_blank">GitHub</a>
                <a href="https://github.com/SSBun/Shark/releases" class="btn btn-primary" style="padding: 12px 24px;">
                    Download
                </a>
            </nav>
        </div>
    </header>

    {{ content }}

    <footer>
        <div class="container">
            <a href="{{ '/' | relative_url }}" class="logo">
                <div class="logo-icon" style="width:36px;height:36px;font-size:18px;">🦈</div>
                Shark
            </a>
            <div class="footer-links">
                <a href="https://github.com/SSBun/Shark">GitHub</a>
                <a href="https://github.com/SSBun/Shark/releases">Releases</a>
                <a href="https://github.com/SSBun/Shark/issues">Support</a>
            </div>
            <p>© 2024 Shark. Built with ❤️ for the Cursor IDE community.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            document.querySelectorAll('.bg-orb').forEach((orb, index) => {
                const speed = (index + 1) * 0.5;
                orb.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });

        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });
    </script>
</body>
</html>
